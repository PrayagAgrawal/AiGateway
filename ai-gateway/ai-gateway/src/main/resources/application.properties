spring.application.name=ai-gateway
# PostgreSQL DB
#spring.datasource.url=jdbc:postgresql://localhost:5432/aigateway
#spring.datasource.username=postgres
#spring.datasource.password=prayag

spring.datasource.url=jdbc:postgresql://postgres:5432/aigateway
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Fix dialect (optional but safe)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.data.redis.host=redis
spring.data.redis.port=6379

gemini.api-key=
